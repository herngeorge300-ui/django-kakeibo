{% extends 'kakeibo/base.html' %} {% block content %}
<div class="table-responsive">
    <table class="table table-striped table-sm">
        <tbody id="bod">
                <tr id="table">
                    <td>{{ kakeibo.id }}</td>
                    <td>{{ kakeibo.date }}</td>
                    <td>{{ kakeibo.category }}</td>
                    <td>{{ kakeibo.money }}</td>
                    <td>{{ kakeibo.memo }}</td>
                </tr>
        </tbody>
    </table>
</div>
<a href="/">Go Back</a>
<div class="mt-3 mb-5">
        <a
        href="{% url 'kakeibo:cel_update' kakeibo.pk %}"
        class="btn btn-primary btn-lg"
        ><i class="fa-solid fa-file-pen"></i>変更</a
        >
        <a
        href="{% url 'kakeibo:cel_delete' kakeibo.pk %}"
        class="btn btn-danger btn-lg"
        ><i class="fa-solid fa-trash-can"></i>削除</a
        >
</div>
{% endblock %}
