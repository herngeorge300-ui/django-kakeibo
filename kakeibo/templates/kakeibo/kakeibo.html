{% extends 'kakeibo/base.html' %} {% block content %}
<div class="table-responsive">
    <table class="table table-striped table-sm">
        <thead>
            <tr>
                <th>#</th>
                <th>日付</th>
                <th>カテゴリ</th>
                <th>金額</th>
                <th>メモ</th>
            </tr>
        </thead>
        <tbody id="bod">
            {% for kane in kakeibos %}
            <tr id="table">
                <td>{{ kane.id }}</td>
                <td>{{ kane.date }}</td>
                <td>{{ kane.category }}</td>
                <td>{{ kane.money }}</td>
                <td>{{ kane.memo }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
